services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Pull qwen2.5:3b on first run via init script:
    entrypoint: >
      sh -c "ollama serve & sleep 3 && ollama pull qwen2.5:3b && wait"

  proxy:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOCAL_BASE_URL=http://ollama:11434/v1
      - CONFIG_PATH=/app/config.example.yml

volumes:
  ollama-models:
