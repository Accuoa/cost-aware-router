routing:
  length_threshold_tokens: 300
  complexity_keywords:
    - "step by step"
    - "deeply analyze"
    - "thoroughly explain"
    - "compare and contrast"
    - "detailed analysis"
    - "comprehensive"
    - "in depth"
  always_cloud_keywords: []
  always_local_keywords: []

backends:
  local:
    # ${LOCAL_BASE_URL:-http://localhost:11434/v1} — defaults to localhost (native dev),
    # docker-compose sets LOCAL_BASE_URL=http://ollama:11434/v1 so the same config works there too.
    base_url: ${LOCAL_BASE_URL:-http://localhost:11434/v1}
    model: ${LOCAL_MODEL:-qwen2.5:3b}
  cloud:
    base_url: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile
    api_key_env: GROQ_API_KEY
